# Template Sensors for Kitchen Dashboard
# Add these to your templates.yaml file

# ============================================================
# MUSIC ASSISTANT - RECENTLY PLAYED
# ============================================================

- trigger:
    - platform: time_pattern
      minutes: "/1"
    - platform: homeassistant
      event: start
  action:
    - action: music_assistant.get_library
      data:
        config_entry_id: YOUR_MUSIC_ASSISTANT_CONFIG_ENTRY_ID
        media_type: playlist
        limit: 16
        order_by: last_played
      response_variable: result
  sensor:
    - name: "Music Dashboard Recently Played"
      unique_id: music_dashboard_recently_played
      icon: mdi:history
      state: >-
        {{ now() }}
      attributes:
        items: >-
          {% set old = state_attr('music_dashboard_recently_played', 'items') %}
          {% set ns = namespace(out=[]) %}
          {% if result is defined and 'items' in result %}
            {% for item in result['items'] if 'provider=builtin' not in (item.image or '') %}
              {% set ns.out = ns.out + [{"name": item.name, "uri": item.uri, "image": item.image}] %}
            {% endfor %}
          {% endif %}
          {{ ns.out if ns.out | length > 0 else old }}

# ============================================================
# WEATHER FORECAST SENSORS
# ============================================================

- trigger:
    - platform: time_pattern
      minutes: /5
    - platform: homeassistant
      event: start
  sensor:
    - name: "Google Weather Hourly Forecasts (Full Hourly Forecast)"
      unique_id: google_weather_hourly_forecasts_full_hourly_forecast
      state: >
        {% if forecast['weather.home'].forecast is defined
              and forecast['weather.home'].forecast | length > 0 %}
          {{ as_local(strptime(forecast['weather.home'].forecast[0].datetime,
                               '%Y-%m-%dT%H:%M:%S%z')) }}
        {% else %}
          unknown
        {% endif %}
      attributes:
        forecasts: >
          {% if forecast['weather.home'].forecast is defined
                and forecast['weather.home'].forecast | length > 0 %}
            [
            {%- for f in forecast['weather.home'].forecast %}
              {
                "datetime": "{{ as_local(strptime(f.datetime, '%Y-%m-%dT%H:%M:%S%z')) }}",
                "condition": "{{ f.condition }}",
                "temperature": {{ f.temperature }},
                "precipitation": {{ f.precipitation }},
                "wind_speed": {{ f.wind_speed }},
                "wind_bearing": {{ f.wind_bearing }},
                "humidity": {{ f.humidity if f.humidity is defined else 'null' }},
                "cloud_coverage": {{ f.cloud_coverage if f.cloud_coverage is defined else 'null' }},
                "uv_index": {{ f.uv_index if f.uv_index is defined else 'null' }}
              }{{ "," if not loop.last }}
            {%- endfor %}
            ]
          {% else %}
            []
          {% endif %}
  action:
    - action: weather.get_forecasts
      target:
        entity_id: weather.home
      data:
        type: hourly
      response_variable: forecast

# ============================================================
# WEATHER SUMMARY SENSORS
# ============================================================

- sensor:
    - name: "Forecast UV Index"
      unique_id: forecast_uv_index
      unit_of_measurement: "UV"
      state: >
        {% set f = state_attr('sensor.google_weather_hourly_forecasts_full_hourly_forecast', 'forecasts') %}
        {% if f is sequence and f | count > 0 %}
          {{ f[0].uv_index }}
        {% else %}
          unknown
        {% endif %}

    - name: "Forecast Cloud Coverage"
      unique_id: forecast_cloud_coverage
      unit_of_measurement: "%"
      state: >
        {% set f = state_attr('sensor.google_weather_hourly_forecasts_full_hourly_forecast', 'forecasts') %}
        {% if f is sequence and f | count > 0 %}
          {{ f[0].cloud_coverage }}
        {% else %}
          unknown
        {% endif %}

    - name: "Forecast Rainfall"
      unique_id: forecast_rainfall
      unit_of_measurement: "in"
      state: >
        {% set f = state_attr('sensor.google_weather_hourly_forecasts_full_hourly_forecast', 'forecasts') %}
        {% if f is sequence and f | count > 0 %}
          {{ f[0].precipitation }}
        {% else %}
          unknown
        {% endif %}

    - name: "Forecast Wind Speed"
      unique_id: forecast_wind_speed
      unit_of_measurement: "mph"
      state: >
        {{ state_attr('weather.home', 'wind_speed') }}

    - name: "Forecast Temperature"
      unique_id: forecast_temperature
      unit_of_measurement: "F"
      state: >
        {{ state_attr('weather.home', 'temperature') }}

    - name: "Next Rain Summary"
      state: >
        {%- set forecasts = state_attr('sensor.google_weather_hourly_forecasts_full_hourly_forecast','forecasts') -%}
        {%- if forecasts -%}
        {%- set rain_forecasts = forecasts | selectattr('precipitation','defined') | selectattr('precipitation','gt',0) | list -%}
        {%- if rain_forecasts | count > 0 -%}
        {%- set next_rain = rain_forecasts | first -%}
        {%- set val = next_rain.precipitation | float -%}
        {%- if val < 2.5 -%}Light rain expected
        {%- elif val < 7.6 -%}Moderate rain expected
        {%- elif val < 35 -%}Heavy rain expected
        {%- else -%}Very heavy rain expected
        {%- endif -%}
        {%- else -%}No rain expected today
        {%- endif -%}
        {%- else -%}Forecast unavailable
        {%- endif -%}

    - name: "24h Rainfall Summary"
      state: >
        {%- set forecasts = state_attr('sensor.google_weather_hourly_forecasts_full_hourly_forecast','forecasts') -%}
        {%- if forecasts -%}
        {%- set values = forecasts | map(attribute='precipitation') | map('float') | list -%}
        {%- set total = values | sum -%}
        Total: {{ total | round(1) }} inches in next 24h
        {%- else -%}Forecast unavailable
        {%- endif -%}

    - name: "UV and Cloud Summary"
      state: >
        {%- set forecasts = state_attr('sensor.google_weather_hourly_forecasts_full_hourly_forecast','forecasts') -%}
        {%- if forecasts -%}
        {%- set uv_values = forecasts | map(attribute='uv_index') | map('float') | list -%}
        {%- set peak_uv = uv_values | max -%}
        {%- set cloud_values = forecasts | map(attribute='cloud_coverage') | map('float') | list -%}
        {%- set avg_cloud = (cloud_values | sum / cloud_values | length) -%}
        Peak UV: {{ peak_uv | round(1) }}, Avg cloud: {{ avg_cloud | round(0) }}%
        {%- else -%}Forecast unavailable
        {%- endif -%}

    - name: "Wind Summary"
      state: >
        {%- set forecasts = state_attr('sensor.google_weather_hourly_forecasts_full_hourly_forecast','forecasts') -%}
        {%- if forecasts -%}
        {%- set speeds = forecasts | map(attribute='wind_speed') | map('float') | list -%}
        {%- set peak = speeds | max -%}
        Peak wind: {{ peak | round(1) }} mph
        {%- else -%}Forecast unavailable
        {%- endif -%}

# ============================================================
# PERSON LOCATION TRACKING (for header avatars)
# ============================================================

- sensor:
    - name: "Person 1 Location Icon"
      unique_id: person_1_location_icon
      state: >
        {% set state = states('person.person_1') %}
        {% if state == 'home' %}
          mdi:home
        {% elif state == 'Work' %}
          mdi:briefcase
        {% else %}
          mdi:map-marker
        {% endif %}

    - name: "Person 1 Location Color"
      unique_id: person_1_location_color
      state: >
        {% set state = states('person.person_1') %}
        {% if state == 'home' %}
          green
        {% elif state == 'Work' %}
          blue
        {% else %}
          orange
        {% endif %}

    - name: "Person 2 Location Icon"
      unique_id: person_2_location_icon
      state: >
        {% set state = states('person.person_2') %}
        {% if state == 'home' %}
          mdi:home
        {% elif state == 'Work' %}
          mdi:briefcase
        {% else %}
          mdi:map-marker
        {% endif %}

    - name: "Person 2 Location Color"
      unique_id: person_2_location_color
      state: >
        {% set state = states('person.person_2') %}
        {% if state == 'home' %}
          green
        {% elif state == 'Work' %}
          blue
        {% else %}
          orange
        {% endif %}

# ============================================================
# LIGHT COUNTER
# ============================================================

- sensor:
    - name: "Number of Lights On"
      state: >
        {{ states.light
          | rejectattr('attributes.is_deconz_group', 'eq', true)
          | rejectattr('attributes.entity_id', 'defined')
          | selectattr('state', 'eq', 'on')
          | list | count }}

# ============================================================
# OUTSIDE FEELS LIKE TEMPERATURE
# ============================================================

- sensor:
    - name: Outside Feels Like
      unique_id: outside_apparent_temp
      unit_of_measurement: F
      device_class: temperature
      state: >-
        {% set temperature = state_attr('weather.home','temperature') %}
        {% set windspeed = state_attr('weather.home','wind_speed') %}
        {% set humidity = state_attr('weather.home','humidity') %}
        {% set feelslike = temperature %}

        {% if temperature <= 50 and humidity >= 3 %}
          {% set feelslike = 35.74 + (0.6215 * temperature) - 35.75 * (windspeed ** 0.16) + ( (0.4275 * temperature) * (windspeed ** 0.16) ) %}
        {% endif %}

        {% if feelslike == temperature and temperature >= 80 %}
          {% set feelslike = 0.5 * (temperature + 61 + ((temperature - 68) * 1.2) + (humidity * 0.094) ) %}
        {% endif %}
        {{ float(feelslike, 0) | round(0) }}
