              .bubble-pop-up {
                height: inherit !important;
                margin-bottom: 30px;
              }
          - type: custom:bubble-card
            card_type: separator
            name: Lights
            icon: mdi:lightbulb-group
            sub_button:
              main: []
              bottom: []
          - type: horizontal-stack
            cards:
            - type: custom:bubble-card
              card_type: button
              button_type: switch
              show_state: false
              sub_button:
                main: []
                bottom: []
              name: Opener Lights
              icon: mdi:lightbulb-group
              show_attribute: false
              attribute: brightness
              tap_action:
                action: toggle
              button_action: {}
              use_accent_color: true
              hold_action:
                action: more-info
              entity: light.garage_lights
            - type: custom:bubble-card
              card_type: button
              button_type: slider
              show_state: true
              sub_button:
                main: []
                bottom: []
              name: Mudroom Light
              icon: mdi:led-strip-variant
              show_attribute: false
              attribute: brightness
              tap_action:
                action: toggle
              button_action: {}
              use_accent_color: true
              hold_action:
                action: more-info
              entity: light.wled_mudroom
          - type: custom:bubble-card
