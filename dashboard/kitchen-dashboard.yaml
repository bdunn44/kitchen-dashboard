                              yaxis_id: rain
                              data_generator: |
                                return entity.attributes.forecasts.map(f => {
                                  let val = f.precipitation;
                                  let color = '#9e9e9e';
                                  if (val > 0 && val < 2.5) {
                                    color = '#4FC3F7';
                                  } else if (val < 7.6) {
                                    color = '#0288D1';
                                  } else if (val < 35) {
                                    color = '#01579B';
                                  } else {
                                    color = '#311B92';
                                  }
                                  return {
                                    x: new Date(f.datetime).getTime(),
                                    y: val,
                                    fillColor: color
                                  };
                                });
                            - entity: >-
                                sensor.google_weather_hourly_forecasts_full_hourly_forecast
                              name: Temp
                              type: line
                              curve: smooth
                              yaxis_id: temp
                              stroke_width: 2
                              color: "#E53935"
                              data_generator: |
                                return entity.attributes.forecasts.map(f => {
                                  return {
                                    x: new Date(f.datetime).getTime(),
                                    y: f.temperature
                                  };
                                });
                        - type: horizontal-stack
                          cards:
                            - type: custom:mushroom-template-card
                              entity: sensor.forecast_rainfall
                              icon: mdi:weather-rainy
                              primary: >
                                {% set r = states('sensor.forecast_rainfall') %} {% if r
                                in ['unknown', 'unavailable', None] %}
                                  Rainfall: None
                                {% else %}
                                  Rainfall: {{ r }} mm
                                {% endif %}
                              secondary: >
                                {% set r = states('sensor.forecast_rainfall') | float(0)
                                %} {% if r == 0 %}
                                  None - Dry conditions
                                {% elif r < 1 %}
                                  Light - Possible drizzle
                                {% elif r < 5 %}
                                  Moderate - Bring umbrella
                                {% elif r < 20 %}
                                  Heavy - Wet outdoors
                                {% else %}
                                  Intense - Flood risk
                                {% endif %}
                              color: >
                                {% set r = states('sensor.forecast_rainfall') | float(0)
                                %} {% if r == 0 %}
                                  blue
                                {% elif r < 1 %}
                                  lightblue
                                {% elif r < 5 %}
                                  cyan
                                {% elif r < 20 %}
                                  orange
                                {% else %}
                                  red
                                {% endif %}
                              features_position: bottom
                              multiline_secondary: true
                            - type: custom:mushroom-template-card
                              entity: sensor.forecast_temperature
                              icon: mdi:thermometer
                              primary: >
                                Temp: {{ states('sensor.forecast_temperature') }} {{
                                state_attr('weather.home', 'temperature_unit') }}
                              secondary: >
                                {% set t = states('sensor.forecast_temperature') |
                                float(0) %} {% if t < 5 %}
                                  Cold - Bundle up
                                {% elif t < 15 %}
                                  Cool - Light jacket
                                {% elif t < 25 %}
                                  Mild - Comfortable
                                {% elif t < 32 %}
                                  Warm - Stay hydrated
                                {% else %}
                                  Hot - Avoid heat
                                {% endif %}
                              color: >
                                {% set current = state_attr('weather.home',
                                'temperature') | float(0) %} {% if current < 16 %}
                                  #CEB2F5
                                {% elif current < 18 %}
                                  #5EBDEE
                                {% elif current < 22 %}
                                  #9cc8b8
                                {% elif current < 24 %}
                                  #e7b562
                                {% elif current < 27 %}
                                  #FF564B      
                                {% else %}
                                  #99332d
                                {% endif %}
                              features_position: bottom
                              multiline_secondary: true
              - title: UV
                icon: m3of:sunny
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:streamline-card
                      template: title_subtitle_card
                      variables:
                        - title: UV Index & Cloud Coverage Forecast
                        - subtitle: "{{ states ('sensor.uv_and_cloud_summary') }}"
                    - type: vertical-stack
                      cards:
                        - type: custom:apexcharts-card
                          graph_span: 24h
                          span:
                            start: hour
                          now:
                            show: true
                          apex_config:
                            chart:
                              height: 240
                            legend:
                              show: true
                            grid:
                              yaxis:
                                lines:
                                  show: false
                            xaxis:
                              crosshairs:
                                show: false
                              tooltip:
                                enabled: false
                            yaxis:
                              - id: uv
                                title:
                                  text: UV Index
                                opposite: false
                                min: 0
                                max: 11
                              - id: cloud
                                title:
                                  text: Cloud Coverage (%)
                                opposite: true
                                min: 0
                                max: 100
                          series:
                            - entity: >-
                                sensor.google_weather_hourly_forecasts_full_hourly_forecast
                              name: UV Index
                              type: line
                              curve: smooth
                              yaxis_id: uv
                              color: "#F9A825"
                              stroke_width: 2
                              data_generator: |
                                return entity.attributes.forecasts.map(f => {
                                  if (f.uv_index == null) return null;
                                  return { x: new Date(f.datetime).getTime(), y: f.uv_index };
                                }).filter(x => x !== null);
                            - entity: >-
                                sensor.google_weather_hourly_forecasts_full_hourly_forecast
                              name: Cloud Coverage
                              type: area
                              yaxis_id: cloud
                              color: "#90CAF9"
                              stroke_width: 1
                              opacity: 0.3
                              data_generator: |
                                return entity.attributes.forecasts.map(f => {
                                  if (f.cloud_coverage == null) return null;
                                  return { x: new Date(f.datetime).getTime(), y: f.cloud_coverage };
                                }).filter(x => x !== null);
                        - type: horizontal-stack
                          cards:
                            - type: custom:mushroom-template-card
                              entity: sensor.forecast_uv_index
                              icon: mdi:weather-sunny-alert
                              primary: |
                                UV Index: {{ states('sensor.forecast_uv_index') }}
                              secondary: >
                                {% set uv = states('sensor.forecast_uv_index') |
                                float(0) %} {% if uv < 3 %}
                                  Low - Safe outdoors
                                {% elif uv < 6 %}
                                  Moderate - Use hat & sunglasses
                                {% elif uv < 8 %}
                                  High - Apply sunscreen
                                {% elif uv < 11 %}
                                  Very High - Seek shade
                                {% else %}
                                  Extreme - Stay indoors
                                {% endif %}
                              color: >
                                {% set uv = states('sensor.forecast_uv_index') |
                                float(0) %} {% if uv < 3 %}
                                  green
                                {% elif uv < 6 %}
                                  yellow
                                {% elif uv < 8 %}
                                  orange
                                {% elif uv < 11 %}
                                  red
                                {% else %}
                                  purple
                                {% endif %}
                              features_position: bottom
                              multiline_secondary: true
                            - type: custom:mushroom-template-card
                              entity: sensor.forecast_cloud_coverage
                              icon: mdi:weather-cloudy
                              primary: |
                                Cloud: {{ states('sensor.forecast_cloud_coverage') }}%
                              secondary: >
                                {% set c = states('sensor.forecast_cloud_coverage') |
                                float(0) %} {% if c <= 25 %}
                                  Clear skies - ideal visibility
                                {% elif c <= 50 %}
                                  Partly cloudy - some sun breaks
                                {% elif c <= 75 %}
                                  Mostly cloudy - limited sunshine
                                {% else %}
                                  Overcast - likely dull conditions
                                {% endif %}
                              color: >
                                {% set c = states('sensor.forecast_cloud_coverage') |
                                float(0) %} {% if c <= 25 %}
                                  blue
                                {% elif c <= 50 %}
                                  light-blue
                                {% elif c <= 75 %}
                                  grey
                                {% else %}
                                  blue-grey
                                {% endif %}
                              features_position: bottom
                              multiline_secondary: true
              - title: Wind
                icon: m3of:storm
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:streamline-card
                      template: title_subtitle_card
                      variables:
                        - title: Wind Speed & Direction Forecast
                        - subtitle: "{{ states ('sensor.wind_summary') }}"
                    - type: vertical-stack
                      cards:
                        - type: custom:apexcharts-card
                          graph_span: 24h
                          span:
                            start: hour
                          now:
                            show: true
                          apex_config:
                            chart:
                              height: 240
                            legend:
                              show: true
                            grid:
                              yaxis:
                                lines:
                                  show: false
                            xaxis:
                              crosshairs:
                                show: false
                              tooltip:
                                enabled: false
                            yaxis:
                              - id: speed
                                title:
                                  text: Wind Speed (km/h)
                                opposite: false
                              - id: direction
                                title:
                                  text: Direction (°)
                                opposite: true
                                min: 0
                                max: 360
                          series:
                            - entity: >-
                                sensor.google_weather_hourly_forecasts_full_hourly_forecast
                              name: Speed
                              type: line
                              curve: smooth
                              yaxis_id: speed
                              color: "#0288D1"
                              stroke_width: 2
                              data_generator: |
                                return entity.attributes.forecasts.map(f => {
                                  let speed = f.wind_speed;
                                  speed = Math.round(speed * 10) / 10; // round to 1 decimal place
                                  return { x: new Date(f.datetime).getTime(), y: speed };
                                });
                            - entity: >-
                                sensor.google_weather_hourly_forecasts_full_hourly_forecast
                              name: Direction
                              type: line
                              curve: smooth
                              yaxis_id: direction
                              color: "#8E24AA"
                              stroke_width: 1
                              data_generator: |
                                return entity.attributes.forecasts.map(f => {
                                  let direction = Math.round(f.wind_bearing); // round to nearest integer
                                  return { x: new Date(f.datetime).getTime(), y: direction };
                                });
                        - type: horizontal-stack
                          cards:
                            - type: custom:mushroom-template-card
                              entity: sensor.forecast_wind_speed
                              icon: mdi:weather-windy
                              primary: >
                                Wind: {{ states('sensor.forecast_wind_speed') }} {{
                                state_attr('weather.home', 'wind_speed_unit') }}
                              secondary: >
                                {% set s = states('sensor.forecast_wind_speed') |
                                float(0) %} {% set d =
                                states('sensor.forecast_wind_direction') | float(0) %}
                                {% if s < 5 %}
                                  Calm - Smooth air
                                {% elif s < 20 %}
                                  Breezy - Light gusts
                                {% elif s < 40 %}
                                  Windy - Secure items
                                {% elif s < 60 %}
                                  Strong - Use caution
                                {% else %}
                                  Gale - Stay indoors
                                {% endif %} ({{ d | round(0) }}°)
                              color: >
                                {% set s = states('sensor.forecast_wind_speed') |
                                float(0) %} {% if s < 5 %}
                                  green
                                {% elif s < 20 %}
                                  yellow
                                {% elif s < 40 %}
                                  orange
                                {% elif s < 60 %}
                                  red
                                {% else %}
                                  purple
                                {% endif %}
                              features_position: bottom
