          #   cards: !include kitchen-dashboard-pg-2.yaml

      ### FOOTER ###
      - type: custom:layout-card
        view_layout:
          grid-area: footer
        layout_type: grid
        layout:
          grid-template-columns: 1fr auto
        cards: !include kitchen-dashboard-footer.yaml

      ### POPUPS ### 
      # Garage #
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            name: Garage
            icon: mdi:garage-variant
            hash: "#garage"
            button_type: name
            sub_button:
              main: []
              bottom: []
            show_icon: true
            show_name: true
            button_action: {}
