      # NEW Music #
      - type: vertical-stack
        cards:
          # ── Pop-up container ──────────────────────────────────────
          - type: custom:bubble-card
            card_type: pop-up
            name: Music
            icon: mdi:music
            hash: "#music"
            button_type: name
            show_icon: true
            show_name: true
            sub_button:
              main:
                - entity: image.music_assistant_jukebox_internal_access_qr_code
