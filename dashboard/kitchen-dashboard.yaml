            name: Doors
            icon: mdi:garage-open-variant
            sub_button:
              main: []
              bottom: []
          - type: custom:bubble-card
            card_type: cover
            sub_button:
              main: []
              bottom: []
            entity: cover.garage_single_door
            name: Single Door
            icon_open: mdi:garage-open
            icon_close: mdi:garage
            show_attribute: false
            show_state: true
            tap_action:
              action: none
            button_action: {}
          - type: custom:bubble-card
            card_type: cover
            sub_button:
              main: []
              bottom: []
            entity: cover.garage_double_door
            name: Double Door
            icon_open: mdi:garage-open-variant
            icon_close: mdi:garage-variant
            show_attribute: false
            show_state: true
            tap_action:
              action: none
            button_action: {}
      # Main #
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            name: Main Floor
            icon: mdi:sofa
            hash: "#main"
            button_type: name
            sub_button:
              main: []
              bottom: []
            show_icon: true
            show_name: true
            button_action: {}
            styles: |-
              .bubble-pop-up {
                height: inherit !important;
                margin-bottom: 30px;
              }
          - type: custom:bubble-card
            card_type: separator
            name: Lights
            icon: mdi:lightbulb-group
            sub_button:
              main: []
              bottom: []
          - type: custom:bubble-card
            card_type: button
            button_type: slider
            entity: light.living_area_overhead
            show_state: true
            sub_button:
              main: []
              bottom: []
            name: Overhead
            icon: mdi:light-recessed
            show_attribute: true
            attribute: brightness
            tap_action:
              action: toggle
            button_action: {}
            use_accent_color: true
            hold_action:
              action: more-info
          - type: horizontal-stack
            cards:
              - type: custom:bubble-card
                card_type: button
                button_type: switch
                entity: light.island
                show_state: true
                sub_button:
                  main: []
