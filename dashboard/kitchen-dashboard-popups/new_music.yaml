                      padding-bottom: 8px;
                    }
                    #root streamline-card {
                      min-width: 100px;
                      max-width: 100px;
                      flex-shrink: 0;
                    }
            card:
              type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: playlist-tile
                  variables:
                    tile_name: "Hozier Radio"
                    media_id: "library://playlist/127"
                    media_type: "playlist"
                    artwork_url: "/local/playlist-art/hozier-radio.jpg"
                - type: custom:streamline-card
                  template: playlist-tile
                  variables:
                    tile_name: "Pretty Lights"
