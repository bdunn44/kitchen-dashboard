                    artwork_url: "/local/playlist-art/best-of-pretty-lights.jpg"
                - type: custom:streamline-card
                  template: playlist-tile
                  variables:
                    tile_name: "Joywave Radio"
                    media_id: "library://playlist/77"
                    media_type: "playlist"
                    artwork_url: "/local/playlist-art/joywave-radio.jpg"

          # ━━ SECTION: Recently Played (Dynamic from MA) ━━━━━━━━━━
          - type: custom:bubble-card
            card_type: separator
            name: recently played
            icon: mdi:history
          
          - type: custom:mod-card
            card_mod:
              style:
              style: 
                .: |
                  ha-card {
                    display: block;
                    overflow-x: auto;
                  }
                streamline-card:
                  $: |
                    hui-horizontal-stack-card {
                      display: inline-block;
                    }
                  hui-horizontal-stack-card: 
                    $: |
                      #root {
                        display: flex !important;
                        flex-wrap: nowrap !important;
                        padding-bottom: 8px;
                      }
                      #root streamline-card {
                        min-width: 100px;
