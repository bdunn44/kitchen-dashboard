                - type: custom:streamline-card
                  template: playlist-tile
                  variables:
                    tile_name: "Disney Classical"
                    media_id: "library://playlist/126"
                    media_type: "playlist"
                    artwork_url: "/local/playlist-art/disney-classical.jpg"
                - type: custom:streamline-card
                  template: playlist-tile
                  variables:
                    tile_name: "Chill Good Vibes Mix"
                    media_id: "library://playlist/121"
                    media_type: "playlist"
                    artwork_url: "/local/playlist-art/chill-good-vibes-mix.jpg"
                - type: custom:streamline-card
                  template: playlist-tile
                  variables:
                    tile_name: "Deep House"
                    media_id: "library://playlist/124"
                    media_type: "playlist"
                    artwork_url: "/local/playlist-art/deep-house-relax.jpg"
                - type: custom:streamline-card
                  template: playlist-tile
                  variables:
                    tile_name: "Ours Samplus"
                    media_id: "library://playlist/92"
                    media_type: "playlist"
                    artwork_url: "/local/playlist-art/ours-samplus-radio.jpg"
                - type: custom:streamline-card
                  template: playlist-tile
                  variables:
                    tile_name: "Chill"
                    media_id: "library://playlist/117"
                    media_type: "playlist"
                    artwork_url: "/local/playlist-art/chill.jpg"

          # ━━ SECTION: Party ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          - type: custom:bubble-card
            card_type: separator
            name: Party
            icon: akar-icons:rock-on

          - type: custom:mod-card
            card_mod:
              style: 
                .: |
                  ha-card {
                    display: block;
                    overflow-x: auto;
                  }
                  hui-horizontal-stack-card {
                    display: inline-block;
                  }
                hui-horizontal-stack-card: 
                  $: |
